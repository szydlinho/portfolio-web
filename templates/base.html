<!doctype html>
<html lang="{{ lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ profile.name }} — {{ profile.role }}</title>
  <meta name="description" content="{{ profile.tagline }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

  <header class="site-header">
    <div class="wrap site-header__inner">
      <a class="logo" href="#top">&gt;{{ profile.name.split(' ')[0].lower() }}_{{ profile.name.split(' ')[1].lower() }}</a>
      <nav class="nav">
        <a href="#o-mnie">{{ ui.nav_about }}</a>
        <a href="#umiejetnosci">{{ ui.nav_skills }}</a>
        <a href="#projekty">{{ ui.nav_projects }}</a>
        <a href="#kontakt">{{ ui.nav_contact }}</a>
        <span class="lang-switch mono" aria-label="język / language">
          <span class="lang-switch__current">{{ lang | upper }}</span>
          <span class="lang-switch__sep">/</span>
          <a class="lang-switch__link" href="{{ other_url }}">{{ other_lang | upper }}</a>
        </span>
      </nav>
    </div>
  </header>

  <main id="top">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="wrap site-footer__inner">
      <span class="mono muted">{{ profile.name }} — {{ profile.location }}</span>
      <span class="mono muted">© <span id="year"></span></span>
    </div>
  </footer>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
